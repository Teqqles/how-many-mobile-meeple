name: Tag Release

on:
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST=$(git rev-list --max-parents=0 HEAD)
          fi

          COMMITS=$(git log "${LATEST}..HEAD" --pretty=%s)
          echo "Commits since $LATEST:"
          echo "$COMMITS"

          # Filter out skip/docs commits
          RELEVANT=$(echo "$COMMITS" | grep -viE '^\[skip ci\]|^chore: bump version|^docs(\(.*\))?:' || true)

          if [ -z "$RELEVANT" ]; then
            echo "type=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MINOR_COUNT=$(echo "$RELEVANT" | grep -ciE '^feat(\(.*\))?:' || true)
          PATCH_COUNT=$(echo "$RELEVANT" | grep -cviE '^feat(\(.*\))?:' || true)

          echo "minor_count=$MINOR_COUNT" >> "$GITHUB_OUTPUT"
          echo "patch_count=$PATCH_COUNT" >> "$GITHUB_OUTPUT"
          echo "type=bump" >> "$GITHUB_OUTPUT"

      - name: Compute new version
        if: steps.bump.outputs.type != 'skip'
        id: version
        run: |
          MINOR_COUNT="${{ steps.bump.outputs.minor_count }}"
          PATCH_COUNT="${{ steps.bump.outputs.patch_count }}"

          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"

          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)

          if [ "$MINOR_COUNT" -gt 0 ]; then
            MINOR=$((MINOR + MINOR_COUNT))
            PATCH=$PATCH_COUNT
          else
            PATCH=$((PATCH + PATCH_COUNT))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "semver=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Update pubspec.yaml
        if: steps.bump.outputs.type != 'skip'
        run: |
          SEMVER="${{ steps.version.outputs.semver }}"

          # Extract current build number and increment it
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          BUILD=$(echo "$CURRENT" | cut -d+ -f2)
          NEW_BUILD=$((BUILD + 1))

          NEW_VERSION="${SEMVER}+${NEW_BUILD}"
          echo "Updating pubspec.yaml version to $NEW_VERSION"

          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml

      - name: Fetch GitHub issues
        if: steps.bump.outputs.type != 'skip'
        id: issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 30,
            });
            const result = issues.data
              .filter(i => !i.pull_request)
              .map(i => ({
                number: i.number,
                title: i.title,
                labels: i.labels.map(l => l.name),
              }));
            const fs = require('fs');
            fs.writeFileSync('/tmp/github_issues.json', JSON.stringify(result));

      - name: Generate about page data
        if: steps.bump.outputs.type != 'skip'
        run: python3 scripts/generate_about_data.py --issues-file /tmp/github_issues.json

      - name: Commit, tag, and push
        if: steps.bump.outputs.type != 'skip'
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add pubspec.yaml lib/assets/about_data.json
          git commit -m "chore: bump version to ${TAG} [skip ci]"
          git tag "$TAG"
          git push origin main "$TAG"
